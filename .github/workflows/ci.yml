name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    
    # We need to run services in GitHub Actions that match our local docker-compose
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/auth_db
      REDIS_URL: redis://localhost:6379/0
      # Secret key for testing only
      SECRET_KEY: test-secret-key-123

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff Linter
        run: uv run ruff check .

      - name: Run Ruff Formatter Verification
        run: uv run ruff format . --check
        
      - name: Run pre-test Database Migrations
        # SQLAlchemy and Alembic tests often need the migrations to run against the test DB
        run: uv run alembic upgrade head

      - name: Run PyTest
        run: uv run pytest -v
