version: '3.8'

services:
  api:
    build: .
    container_name: auth_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/auth_db
      - REDIS_URL=redis://redis:6379/0
      # Wait for the DB to be ready before running migrations and starting the API
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run fastapi run src/main.py --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      # Mount the ML models directory to persist the pickle file across container restarts
      - ml_models_data:/app/src/ml/models

  postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  ml_models_data:
